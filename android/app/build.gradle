apply plugin: 'com.android.application'

// Release signing config - read from a properties file OUTSIDE this project
// entirely (never inside the repo, even gitignored - a project-local file was
// tried first and this workspace's own file-change monitoring surfaced its
// contents unintentionally, so nothing sensitive lives under the project root
// anymore). Never read/logged by this build script beyond the property lookups
// below; Gradle loads the file's actual values directly into memory.
def signingPropertiesFile = new File(System.getProperty("user.home"), "keys/playcydi-signing.properties")
def signingProperties = new Properties()
if (signingPropertiesFile.exists()) {
    signingProperties.load(new FileInputStream(signingPropertiesFile))
}

// Fails fast, with a clear message, only when a release-type task is actually
// being run - evaluated once the full task graph is known, so `assembleDebug`/
// tests/etc. are never affected by this file's absence. A configuration-time
// check inside buildTypes.release{} would fire for every build type, including
// debug, since Gradle configures the whole variant model regardless of which
// task was requested.
gradle.taskGraph.whenReady { taskGraph ->
    def buildingRelease = taskGraph.allTasks.any { it.name.toLowerCase().contains("release") }
    if (!buildingRelease) return

    if (!signingPropertiesFile.exists()) {
        throw new GradleException(
            "Release signing properties not found at ${signingPropertiesFile}. " +
            "Create that file (storeFile, storePassword, keyAlias, keyPassword) before " +
            "building a release APK/AAB - see android/app/build.gradle for the expected keys."
        )
    }
    // Validates presence only - never logs/echoes any value from the file, even
    // the (non-secret) storeFile path, to stay within "never inspect this file".
    ["storeFile", "storePassword", "keyAlias", "keyPassword"].each { key ->
        def value = signingProperties[key]
        if (value == null || value.toString().trim().isEmpty()) {
            throw new GradleException(
                "Release signing properties file at ${signingPropertiesFile} is missing (or has a blank) " +
                "'${key}' value. Required keys: storeFile, storePassword, keyAlias, keyPassword."
            )
        }
    }
    if (!new File(signingProperties['storeFile'].toString()).exists()) {
        throw new GradleException(
            "The keystore file referenced by 'storeFile' in ${signingPropertiesFile} does not exist on disk. " +
            "Double-check the path (forward slashes, even on Windows)."
        )
    }
}

android {
    namespace = "com.playcydi.cydi"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.playcydi.cydi"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // versionName mirrors APP_VERSION in src/app/constants.ts (the in-app
        // "Version X" string on the Settings screen) - kept in sync by hand so the
        // Play Store listing/device Settings always match what the app itself claims.
        //
        // versionCode must strictly increase on every APK/AAB actually distributed to a
        // device or the Play Store (side-load, internal testing, or production) - Android
        // silently refuses to install an update whose versionCode isn't higher than what's
        // already on the device, and neither the OS nor the installer surfaces an error:
        // MIUI's package installer just showed "Open" for the already-installed version
        // and nothing was overwritten. Reusing the same versionCode across debug builds
        // during development, then forgetting to bump it before the next real distribution,
        // is what caused that.
        // 6 shipped to Play internal testing (release/v6-internal-test); 7 was the
        // local ContentRepository test build; 8 shipped with broken assets
        // (Dropbox EBUSY corrupted that cap sync); 9 = fixed dynamic-content test
        // build; 10 = same build with the WebView DevTools socket enabled
        // (CYDI_TEST_WEBVIEW_DEBUG) so the locked MIUI device can be driven for
        // E2E. All 0.27.2; versionCode bumps only because MIUI silently refuses
        // same-versionCode updates. 7-10 were local/DevTools test builds (never
        // for Play). 11 = first clean production candidate: no DevTools, no API
        // override, signed with the Play keystore, for Closed Testing.
        versionCode 11
        versionName "0.27.2"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (signingPropertiesFile.exists()) {
                storeFile file(signingProperties['storeFile'])
                storePassword signingProperties['storePassword']
                keyAlias signingProperties['keyAlias']
                keyPassword signingProperties['keyPassword']
            }
        }
    }
    buildTypes {
        release {
            if (signingPropertiesFile.exists()) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
